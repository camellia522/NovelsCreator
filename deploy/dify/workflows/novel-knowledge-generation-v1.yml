    - data:
        code: "# AGG · Knowledge Validation Aggregate + Route\n#\n# 输入: validate_result,\
          \ retry_count, max_retry, knowledge_json\n# 输出: route, retry_count, retry_issues_formatted,\
          \ knowledge_valid, validation_report, knowledge_json\n\nimport json\nimport\
          \ re\nfrom typing import Any\n\nTHINK_RE = re.compile(\n    r\"<(?:redacted_)?think(?:ing)?>[\\\
          s\\S]*?</(?:redacted_)?think(?:ing)?>\",\n    re.I,\n)\n\n\ndef _strip_think(text:\
          \ str) -> str:\n    return THINK_RE.sub(\"\", text or \"\").strip()\n\n\n\
          def _parse_llm_json(raw: Any) -> dict:\n    if isinstance(raw, dict):\n\
          \        return raw\n    if raw is None:\n        return {}\n    text =\
          \ _strip_think(str(raw).strip())\n    if not text or text.lower() in (\"\
          null\", \"none\"):\n        return {}\n    if text.startswith(\"```\"):\n\
          \        lines = text.split(\"\\n\")\n        text = \"\\n\".join(lines[1:-1]\
          \ if len(lines) > 2 else lines).strip()\n    try:\n        parsed = json.loads(text)\n\
          \        return parsed if isinstance(parsed, dict) else {}\n    except json.JSONDecodeError:\n\
          \        pass\n    start = text.find(\"{\")\n    end = text.rfind(\"}\"\
          )\n    if start >= 0 and end > start:\n        try:\n            parsed\
          \ = json.loads(text[start : end + 1])\n            return parsed if isinstance(parsed,\
          \ dict) else {}\n        except json.JSONDecodeError:\n            pass\n\
          \    return {}\n\n\ndef _to_int(value: Any, fallback: int = 0) -> int:\n\
          \    try:\n        return int(value)\n    except (TypeError, ValueError):\n\
          \        return fallback\n\n\ndef _as_bool(value: Any) -> bool:\n    if\
          \ isinstance(value, bool):\n        return value\n    if isinstance(value,\
          \ str):\n        return value.strip().lower() in (\"true\", \"1\", \"yes\"\
          )\n    if isinstance(value, (int, float)):\n        return value != 0\n\
          \    return bool(value)\n\n\ndef _normalize_knowledge_json(raw: Any) ->\
          \ str:\n    if raw is None:\n        return \"{}\"\n    if isinstance(raw,\
          \ dict):\n        return json.dumps(raw, ensure_ascii=False)\n    text =\
          \ str(raw).strip()\n    if not text or text.lower() in (\"null\", \"none\"\
          ):\n        return \"{}\"\n    try:\n        parsed = json.loads(text)\n\
          \        if isinstance(parsed, dict):\n            return json.dumps(parsed,\
          \ ensure_ascii=False)\n    except json.JSONDecodeError:\n        pass\n\
          \    parsed = _parse_llm_json(text)\n    if isinstance(parsed.get(\"knowledge\"\
          ), dict):\n        k = parsed[\"knowledge\"]\n        return json.dumps(\n\
          \            {\n                \"world\": k.get(\"world\") or {},\n   \
          \             \"characters\": k.get(\"characters\") or [],\n           \
          \     \"factions\": k.get(\"factions\") or [],\n                \"items\"\
          : k.get(\"items\") or [],\n            },\n            ensure_ascii=False,\n\
          \        )\n    return json.dumps(\n        {\n            \"world\": parsed.get(\"\
          world\") or {},\n            \"characters\": parsed.get(\"characters\")\
          \ or [],\n            \"factions\": parsed.get(\"factions\") or [],\n  \
          \          \"items\": parsed.get(\"items\") or [],\n        },\n       \
          \ ensure_ascii=False,\n    )\n\n\ndef _structure_ok(knowledge_json: str)\
          \ -> bool:\n    try:\n        doc = json.loads(knowledge_json)\n    except\
          \ json.JSONDecodeError:\n        return False\n    if not isinstance(doc,\
          \ dict):\n        return False\n    world = doc.get(\"world\") if isinstance(doc.get(\"\
          world\"), dict) else {}\n    title = str(world.get(\"title\") or \"\").strip()\n\
          \    rules = str(world.get(\"rules\") or \"\").strip()\n    if not title\
          \ and len(rules) < 20:\n        return False\n    named = 0\n    for c in\
          \ doc.get(\"characters\") or []:\n        if isinstance(c, dict) and str(c.get(\"\
          name\") or \"\").strip():\n            named += 1\n    return named >= 1\n\
          \n\ndef _empty_outputs(retry_count: int = 0, knowledge_json: str = \"{}\"\
          ) -> dict:\n    return {\n        \"route\": \"retry\",\n        \"retry_count\"\
          : retry_count,\n        \"retry_issues_formatted\": \"- [hard] global: K2\
          \ 未返回有效校验 JSON\",\n        \"knowledge_valid\": False,\n        \"validation_report\"\
          : \"{}\",\n        \"knowledge_json\": knowledge_json,\n    }\n\n\ndef _k1x_empty_outputs(retry_count:\
          \ int, max_retry: int, knowledge_json: str) -> dict:\n    issue = (\n  \
          \      \"- [hard] global: K1X knowledge_json 无有效 world/characters。\"\n \
          \       \"请检查 K1 Structured Output 与 K1X 绑定。\"\n    )\n    new_retry = retry_count\
          \ + 1 if retry_count < max_retry else retry_count\n    route = \"retry\"\
          \ if retry_count < max_retry else \"circuit_break\"\n    report = {\n  \
          \      \"knowledge_valid\": False,\n        \"knowledge_issues\": [\n  \
          \          {\"severity\": \"hard\", \"location\": \"global\", \"message\"\
          : issue}\n        ],\n    }\n    return {\n        \"route\": route,\n \
          \       \"retry_count\": int(new_retry),\n        \"retry_issues_formatted\"\
          : issue,\n        \"knowledge_valid\": False,\n        \"validation_report\"\
          : json.dumps(report, ensure_ascii=False),\n        \"knowledge_json\": knowledge_json,\n\
          \    }\n\n\ndef main(**kwargs: Any) -> dict:\n    try:\n        validate_result\
          \ = kwargs.get(\"validate_result\") or kwargs.get(\"text\") or \"{}\"\n\
          \        knowledge_json = _normalize_knowledge_json(kwargs.get(\"knowledge_json\"\
          ) or \"{}\")\n        retry_count = _to_int(kwargs.get(\"retry_count\"),\
          \ 0)\n        max_retry = _to_int(kwargs.get(\"max_retry\"), 3)\n\n    \
          \    if not _structure_ok(knowledge_json):\n            return _k1x_empty_outputs(retry_count,\
          \ max_retry, knowledge_json)\n\n        v = _parse_llm_json(validate_result)\n\
          \        if not v:\n            out = _empty_outputs(retry_count, knowledge_json)\n\
          \            if retry_count >= max_retry:\n                out[\"route\"\
          ] = \"circuit_break\"\n            else:\n                out[\"retry_count\"\
          ] = retry_count + 1\n            return out\n\n        valid = _as_bool(v.get(\"\
          knowledge_valid\", False))\n        issues = v.get(\"knowledge_issues\"\
          ) or []\n\n        if valid:\n            route = \"continue\"\n       \
          \     new_retry = retry_count\n        elif retry_count < max_retry:\n \
          \           route = \"retry\"\n            new_retry = retry_count + 1\n\
          \        else:\n            route = \"circuit_break\"\n            new_retry\
          \ = retry_count\n\n        formatted = []\n        for item in issues[:12]:\n\
          \            if isinstance(item, dict):\n                formatted.append(\n\
          \                    f\"- [{item.get('severity', 'warn')}] {item.get('location',\
          \ '')}: {item.get('message', '')}\"\n                )\n            else:\n\
          \                formatted.append(f\"- {item}\")\n\n        return {\n \
          \           \"route\": route,\n            \"retry_count\": int(new_retry),\n\
          \            \"retry_issues_formatted\": \"\\n\".join(formatted),\n    \
          \        \"knowledge_valid\": bool(valid),\n            \"validation_report\"\
          : json.dumps(v, ensure_ascii=False),\n            \"knowledge_json\": knowledge_json,\n\
          \        }\n    except Exception:\n        return _empty_outputs(_to_int(kwargs.get(\"\
          retry_count\"), 0))\n"
        code_language: python3
