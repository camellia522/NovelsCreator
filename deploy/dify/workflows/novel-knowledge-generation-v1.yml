            {{ existing_knowledge_snapshot }}\r\n\r\n{% else %}\r\n\r\n{}\r\n\r\n\
            {% endif %}\r\n\r\n生成模式\r\n\r\n\r\n\r\n\r\n\r\ngeneration_mode：{{ generation_mode\
            \ }}\r\n{% if generation_mode == 'expand' %}\r\n\r\n\r\n\r\nexpand 模式：保留\
            \ snapshot 中已有 id 与姓名，只补充/深化缺失字段；禁止删除或重命名已有实体。\r\n{% else %}\r\n\r\n\r\
            \n\r\nbootstrap 模式：在 brief 约束下从零搭建；若 snapshot 非空，与之冲突的字段以 brief 为准。\r\n\
            {% endif %}\r\n\r\n世界观标签\r\n\r\n\r\n\r\n\r\n\r\n类型：{{ genre }}\r\n\r\n\
            \r\n\r\n基调：{{ tone }}\r\n\r\n\r\n\r\n时代：{{ era }}\r\n\r\n\r\n\r\n场景：{{\
            \ scene }}\r\n\r\n输出要求\r\n\r\n\r\n\r\n\r\n\r\nknowledge_summary：150–400\
            \ 字，概括世界格局、核心冲突与主角处境。\r\n\r\n\r\n\r\nknowledge.world：含 title、rules（≥80\
            \ 字硬性设定），可填 genre/era/atmosphere/techLevel/magicConstraint/conflictFocus\
            \ 等。\r\n\r\n\r\n\r\nknowledge.characters：至少 3 名，每人含 id/name/role；主角须出现在\
            \ brief 指定姓名。\r\n\r\n\r\n\r\nknowledge.factions：至少 1 个秘密或公开势力，含 goals。\r\
            \n\r\n\r\n\r\nknowledge.items：至少 1 件关键道具。\r\n\r\n\r\n\r\n不要输出 map/locations/nations。\r\
            \n\r\n请直接输出符合 Schema 的 JSON。"
