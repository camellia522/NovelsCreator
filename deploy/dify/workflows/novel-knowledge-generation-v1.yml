    - data:
        code: "# K1X · 解析 K1 LLM 输出 → knowledge_summary + knowledge_json\n#\n# ===\
          \ Dify 输入 ===\n#   k1_result         ← K1.text（必填其一）\n#   structured_output\
          \ ← K1.structured_output\n#\n# === Dify 输出 ===\n#   knowledge_summary →\
          \ String\n#   knowledge_json    → String  （仅 { world, characters, factions,\
          \ items }）\n\nimport json\nimport re\nfrom typing import Any\n\nTHINK_RE\
          \ = re.compile(\n    r\"<(?:redacted_)?think(?:ing)?>[\\s\\S]*?</(?:redacted_)?think(?:ing)?>\"\
          ,\n    re.I,\n)\n\n\ndef _strip_think(text: str) -> str:\n    return THINK_RE.sub(\"\
          \", text or \"\").strip()\n\n\ndef _parse_llm_json(raw: Any) -> dict:\n\
          \    if isinstance(raw, dict):\n        return raw\n    if raw is None:\n\
          \        return {}\n    text = _strip_think(str(raw).strip())\n    if not\
          \ text or text.lower() in (\"null\", \"none\", \"{}\"):\n        return\
          \ {}\n    if text.startswith(\"```\"):\n        lines = text.split(\"\\\
          n\")\n        text = \"\\n\".join(lines[1:-1] if len(lines) > 2 else lines).strip()\n\
          \    try:\n        parsed = json.loads(text)\n        return parsed if isinstance(parsed,\
          \ dict) else {}\n    except json.JSONDecodeError:\n        pass\n    start\
          \ = text.find(\"{\")\n    if start < 0:\n        return {}\n    depth =\
          \ 0\n    for i in range(start, len(text)):\n        ch = text[i]\n     \
          \   if ch == \"{\":\n            depth += 1\n        elif ch == \"}\":\n\
          \            depth -= 1\n            if depth == 0:\n                try:\n\
          \                    parsed = json.loads(text[start : i + 1])\n        \
          \            return parsed if isinstance(parsed, dict) else {}\n       \
          \         except json.JSONDecodeError:\n                    return {}\n\
          \    return {}\n\n\ndef _unwrap_root(parsed: dict) -> dict:\n    if not\
          \ isinstance(parsed, dict):\n        return {}\n    for key in (\"structured_output\"\
          , \"structuredOutput\", \"output\", \"result\", \"data\", \"json\"):\n \
          \       inner = parsed.get(key)\n        if isinstance(inner, dict):\n \
          \           return inner\n        if isinstance(inner, str) and inner.strip():\n\
          \            nested = _unwrap_root(_parse_llm_json(inner))\n           \
          \ if nested:\n                return nested\n    if isinstance(parsed.get(\"\
          knowledge\"), dict):\n        return parsed\n    return parsed\n\n\ndef\
          \ _normalize_knowledge_doc(parsed: dict) -> tuple[str, dict]:\n    root\
          \ = _unwrap_root(parsed)\n    summary = str(root.get(\"knowledge_summary\"\
          ) or \"\").strip()\n    knowledge = root.get(\"knowledge\")\n    if isinstance(knowledge,\
          \ dict):\n        doc = {\n            \"world\": knowledge.get(\"world\"\
          ) if isinstance(knowledge.get(\"world\"), dict) else {},\n            \"\
          characters\": knowledge.get(\"characters\") if isinstance(knowledge.get(\"\
          characters\"), list) else [],\n            \"factions\": knowledge.get(\"\
          factions\") if isinstance(knowledge.get(\"factions\"), list) else [],\n\
          \            \"items\": knowledge.get(\"items\") if isinstance(knowledge.get(\"\
          items\"), list) else [],\n        }\n        return summary, doc\n    doc\
          \ = {\n        \"world\": root.get(\"world\") if isinstance(root.get(\"\
          world\"), dict) else {},\n        \"characters\": root.get(\"characters\"\
          ) if isinstance(root.get(\"characters\"), list) else [],\n        \"factions\"\
          : root.get(\"factions\") if isinstance(root.get(\"factions\"), list) else\
          \ [],\n        \"items\": root.get(\"items\") if isinstance(root.get(\"\
          items\"), list) else [],\n    }\n    return summary, doc\n\n\ndef _count_named_characters(doc:\
          \ dict) -> int:\n    n = 0\n    for c in doc.get(\"characters\") or []:\n\
          \        if isinstance(c, dict) and str(c.get(\"name\") or \"\").strip():\n\
          \            n += 1\n    return n\n\n\ndef _pick_k1_raw(kwargs: dict) ->\
          \ Any:\n    candidates: list[Any] = []\n    for key in (\"structured_output\"\
          , \"k1_result\", \"text\", \"k1_text\"):\n        val = kwargs.get(key)\n\
          \        if val is None:\n            continue\n        if isinstance(val,\
          \ str) and val.strip().lower() in (\"null\", \"none\", \"\"):\n        \
          \    continue\n        candidates.append(val)\n    best: Any = \"\"\n  \
          \  for val in candidates:\n        _, doc = _normalize_knowledge_doc(_parse_llm_json(val))\n\
          \        if _count_named_characters(doc) > 0:\n            return val\n\
          \        if not best and val not in ({}, []):\n            best = val\n\
          \    return best\n\n\ndef main(**kwargs: Any) -> dict:\n    raw = _pick_k1_raw(kwargs)\n\
          \    parsed = _parse_llm_json(raw)\n    summary, doc = _normalize_knowledge_doc(parsed)\n\
          \n    if _count_named_characters(doc) == 0:\n        for key in (\"structured_output\"\
          , \"k1_result\", \"text\", \"k1_text\"):\n            val = kwargs.get(key)\n\
          \            if val is None or val == raw:\n                continue\n \
          \           alt_summary, alt_doc = _normalize_knowledge_doc(_parse_llm_json(val))\n\
          \            if _count_named_characters(alt_doc) > 0:\n                summary,\
          \ doc = alt_summary or summary, alt_doc\n                break\n\n    return\
          \ {\n        \"knowledge_summary\": summary,\n        \"knowledge_json\"\
          : json.dumps(doc, ensure_ascii=False),\n    }\n"
        code_language: python3
        outputs:
          knowledge_json:
            children: null
            type: string
          knowledge_summary:
            children: null
            type: string
