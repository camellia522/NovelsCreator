    - data:
        code: "# P0 · Outline Context Merge（可选）\n# 大纲工作流 v1 默认 **不需要 P0**，START 直连\
          \ O1 即可。\n# 若画布上保留 P0，请用本文件，勿用章节版 p0_context_merge.py。\n#\n# Dify 输出变量（须与\
          \ return 键名一致）：\n#   merged_context (String)\n#   has_existing_outline (String)\
          \  — \"true\" / \"false\"\n\nimport json\nfrom typing import Any\n\n\ndef\
          \ _pick_str(*keys: str, **kwargs: Any) -> str:\n    for key in keys:\n \
          \       val = kwargs.get(key)\n        if val is not None and str(val).strip():\n\
          \            return str(val)\n    return \"\"\n\n\ndef main(**kwargs: Any)\
          \ -> dict:\n    knowledge_snapshot = _pick_str(\n        \"knowledge_snapshot\"\
          , \"knowledge\", \"merged_context\", **kwargs\n    )\n    outline_brief\
          \ = _pick_str(\"outline_brief\", \"creative_brief\", **kwargs).strip()\n\
          \    plot_memory = _pick_str(\"plot_memory\", \"plot_memo\", **kwargs)\n\
          \n    merged = {\n        \"knowledge_snapshot\": knowledge_snapshot,\n\
          \        \"outline_brief\": outline_brief,\n        \"plot_memory\": plot_memory,\n\
          \    }\n\n    # 若 START 传入的 knowledge 已是 JSON，保留；否则包一层\n    return {\n \
          \       \"merged_context\": json.dumps(merged, ensure_ascii=False),\n  \
          \      \"has_existing_outline\": \"true\" if outline_brief else \"false\"\
          ,\n    }\n"
        code_language: python3
        outputs:
          has_existing_outline:
            children: null
            type: string
          merged_context:
            children: null
            type: string
        selected: false
        title: P0 — 上下文合并
