            \ next_chapter_id }}（chapter.id 必须使用该值，不可改）\r\n\r\n\r\n\r\n只输出 1 章：outline.volumes\
            \ 仅 1 个卷条目，该卷 chapters 仅 1 条\r\n\r\n\r\n\r\n必须在 outline.volumes[0].chapters[0].beats\
            \ 写 3–8 条具体事件节拍（每条 20–80 字）；禁止只在 outline_summary 写故事而不输出 beats\r\n\r\n\
            \r\n\r\n必须严格遵循 knowledge_snapshot.world.settingConstraints、world.magicConstraint\
            \ 与 outline_brief 中「设定锚点」及「实体白名单」\r\n\r\n\r\n\r\n禁止修仙/魔教/灵力/丹道/宗门/法术/穿越/系统/浮空岛/古神/星盘/超自然（除非\
            \ settingConstraints 明确允许）\r\n\r\n\r\n\r\n禁止现代都市创业/商战/互联网题材（除非 settingConstraints\
            \ 明确允许）\r\n\r\n\r\n\r\nbeats 中须出现 brief 指定的主角姓名 + 至少 1 个 knowledge 已登记国家名\
            \ + 至少 1 个已登记地点名\r\n\r\n\r\n\r\n禁止自造与 knowledge 冲突的具名主角/都城/国家（如 brief\
            \ 要求周衍则禁止写李然等替代名）\r\n\r\n\r\n\r\noutline_summary 写本章梗概（50–150 字），须与 beats\
            \ 同一故事、同一设定\r\n\r\n\r\n\r\n若 existing_volume_outline.chapters 为空，表示本卷尚无落盘章节，仍须输出完整\
            \ chapter + beats（id = next_chapter_id）\r\n\r\n\r\n\r\n须承接 existing_volume_outline\
            \ 最后一章与 plot_memory 前序摘要，不得吃书\r\n\r\n\r\n\r\nplot_memory 与 existing_volume_outline\
            \ 冲突时，以 existing_volume_outline 为准\r\n\r\n本卷已有章节\r\n\r\n{{ existing_volume_outline\
            \ }}\r\n\r\n要求\r\n\r\n\r\n\r\n\r\n\r\n类型：{{ genre }}\r\n\r\n\r\n\r\n基调：{{\
            \ tone }}\r\n\r\n\r\n\r\n补充说明：{{ outline_brief }}\r\n\r\n{% else %}\r\n\
            \r\n要求（必填）\r\n\r\n\r\n\r\n\r\n\r\n目标 {{ target_volumes }} 卷、约 {{ target_chapters\
            \ }} 章\r\n\r\n\r\n\r\n{% endif %}\r\n\r\n只输出一个 JSON 对象。禁止 Markdown 代码块。禁止输出\
            \ think / redacted_thinking 思考过程。"
