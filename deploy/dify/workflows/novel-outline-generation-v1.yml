    - data:
        code: "# PARSE · Outline End Outputs Flattener\n#\n# === Dify 输入（均可选，默认空串）===\n\
          #   re_end_outputs  ← RE.end_outputs\n#   cb_end_outputs  ← CB.end_outputs\n\
          #   ok_end_outputs  ← END_OK.end_outputs\n#\n# === Dify 输出（类型须与画布一致）===\n\
          #   status, circuit_break, human_action_required, outline_summary,\n#  \
          \ outline_json, validation_report, retry_issues_formatted,\n#   workflow_version\
          \ → String\n#   retry_count → Number\n#\n# 勿使用 Dify 默认模板 def main(arg1,\
          \ arg2) — 必须整文件替换为本脚本。\n\nimport json\nfrom typing import Any\n\n\ndef _pick_raw(*candidates:\
          \ Any) -> str:\n    for c in candidates:\n        if c is None:\n      \
          \      continue\n        if isinstance(c, dict):\n            return json.dumps(c,\
          \ ensure_ascii=False)\n        text = str(c).strip()\n        if text and\
          \ text not in (\"None\", \"null\"):\n            return text\n    return\
          \ \"\"\n\n\ndef _as_bool_str(value: Any) -> str:\n    if isinstance(value,\
          \ bool):\n        return \"true\" if value else \"false\"\n    if isinstance(value,\
          \ str):\n        return \"true\" if value.strip().lower() in (\"true\",\
          \ \"1\", \"yes\") else \"false\"\n    return \"true\" if value else \"false\"\
          \n\n\ndef _to_int(value: Any, fallback: int = 0) -> int:\n    try:\n   \
          \     return int(value)\n    except (TypeError, ValueError):\n        return\
          \ fallback\n\n\ndef main(**kwargs: Any) -> dict:\n    raw = _pick_raw(\n\
          \        kwargs.get(\"re_end_outputs\"),\n        kwargs.get(\"cb_end_outputs\"\
          ),\n        kwargs.get(\"ok_end_outputs\"),\n        kwargs.get(\"end_outputs\"\
          ),\n    )\n    o = json.loads(raw) if raw else {}\n    report = o.get(\"\
          validation_report\") or {}\n    if isinstance(report, str):\n        try:\n\
          \            report = json.loads(report)\n        except json.JSONDecodeError:\n\
          \            report = {}\n\n    outline_json = o.get(\"outline_json\") or\
          \ \"{}\"\n    if isinstance(outline_json, dict):\n        outline_json =\
          \ json.dumps(outline_json, ensure_ascii=False)\n\n    return {\n       \
          \ \"status\": str(o.get(\"status\") or \"\"),\n        \"circuit_break\"\
          : _as_bool_str(o.get(\"circuit_break\", False)),\n        \"human_action_required\"\
          : _as_bool_str(o.get(\"human_action_required\", False)),\n        \"retry_count\"\
          : _to_int(o.get(\"retry_count\"), 0),\n        \"outline_summary\": str(o.get(\"\
          outline_summary\") or \"\"),\n        \"outline_json\": str(outline_json),\n\
          \        \"validation_report\": json.dumps(report, ensure_ascii=False),\n\
          \        \"retry_issues_formatted\": str(o.get(\"retry_issues_formatted\"\
          ) or \"\"),\n        \"workflow_version\": str(o.get(\"workflow_version\"\
          ) or \"\"),\n    }\n"
