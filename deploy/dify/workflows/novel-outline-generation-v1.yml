          \ typing import Any\n\nTHINK_RE = re.compile(r\"<(?:redacted_)?think>[\\\
          s\\S]*?</(?:redacted_)?think>\", re.I)\n\n\ndef _strip_think(text: str)\
          \ -> str:\n    return THINK_RE.sub(\"\", text or \"\").strip()\n\n\ndef\
          \ _parse_json(raw: Any, fallback: dict) -> dict:\n    if raw is None:\n\
          \        return fallback\n    if isinstance(raw, dict):\n        return\
          \ raw\n    text = _strip_think(str(raw).strip())\n    if not text:\n   \
          \     return fallback\n    if text.startswith(\"```\"):\n        lines =\
          \ text.split(\"\\n\")\n        text = \"\\n\".join(lines[1:-1] if len(lines)\
          \ > 2 else lines).strip()\n    try:\n        parsed = json.loads(text)\n\
          \        return parsed if isinstance(parsed, dict) else fallback\n    except\
          \ json.JSONDecodeError:\n        return fallback\n\n\ndef _normalize_outline_doc(raw:\
          \ Any) -> tuple[str, dict]:\n    parsed = _parse_json(raw, {})\n    summary\
          \ = str(parsed.get(\"outline_summary\") or \"\").strip()\n    outline =\
          \ parsed.get(\"outline\")\n    if isinstance(outline, dict) and isinstance(outline.get(\"\
          volumes\"), list):\n        return summary, outline\n    if isinstance(parsed.get(\"\
          volumes\"), list):\n        return summary, {\"volumes\": parsed[\"volumes\"\
          ]}\n    return summary, {\"volumes\": []}\n\n\ndef _to_int(value: Any, fallback:\
          \ int = 0) -> int:\n    try:\n        return int(value)\n    except (TypeError,\
          \ ValueError):\n        return fallback\n\n\ndef main(**kwargs: Any) ->\
          \ dict:\n    outline_summary = str(kwargs.get(\"outline_summary\") or \"\
          \").strip()\n    outline_json = kwargs.get(\"outline_json\") or \"{}\"\n\
          \    validation_report = kwargs.get(\"validation_report\") or \"{}\"\n \
          \   retry_count = _to_int(kwargs.get(\"retry_count\"), 0)\n\n    extracted_summary,\
          \ outline_doc = _normalize_outline_doc(outline_json)\n    if not outline_summary:\n\
          \        outline_summary = extracted_summary\n\n    report = _parse_json(validation_report,\
          \ {})\n    end_outputs = {\n        \"status\": \"success\",\n        \"\
          circuit_break\": False,\n        \"human_action_required\": False,\n   \
