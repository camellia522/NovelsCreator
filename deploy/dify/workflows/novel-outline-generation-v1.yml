    - data:
        code: "# O1X · 解析 O1 LLM 输出 → outline_summary + outline_json（仅 volumes）\n\
          #\n# === Dify 输入 ===\n#   o1_result         ← O1.text（必填其一）\n#   structured_output\
          \   ← O1.structured_output（Structured Output 开启时强烈建议绑定）\n#\n# === Dify 输出（仅\
          \ 2 项，勿多加）===\n#   outline_summary → String\n#   outline_json    → String\n\
          \nimport json\nimport re\nfrom typing import Any\n\nTHINK_RE = re.compile(\n\
          \    r\"<(?:redacted_)?think(?:ing)?>[\\s\\S]*?</(?:redacted_)?think(?:ing)?>\"\
          ,\n    re.I,\n)\n\n\ndef _strip_think(text: str) -> str:\n    text = THINK_RE.sub(\"\
          \", text or \"\")\n    low = text.lower()\n    for tag in (\"redacted_thinking\"\
          , \"thinking\", \"think\"):\n        open_tag = f\"<{tag}>\"\n        idx\
          \ = low.find(open_tag)\n        if idx < 0:\n            continue\n    \
          \    close_tag = f\"</{tag}>\"\n        close_idx = low.find(close_tag,\
          \ idx)\n        if close_idx < 0:\n            # 模型只输出未闭合思考块、无 JSON → 视为空\n\
          \            return \"\"\n        text = (text[:idx] + text[close_idx +\
          \ len(close_tag) :]).strip()\n        low = text.lower()\n    return text.strip()\n\
          \n\ndef _parse_llm_json(raw: Any) -> dict:\n    if isinstance(raw, dict):\n\
          \        return raw\n    if raw is None:\n        return {}\n    text =\
          \ _strip_think(str(raw).strip())\n    if not text or text.lower() in (\"\
          null\", \"none\", \"{}\"):\n        return {}\n    if text.startswith(\"\
          ```\"):\n        lines = text.split(\"\\n\")\n        text = \"\\n\".join(lines[1:-1]\
          \ if len(lines) > 2 else lines).strip()\n    try:\n        parsed = json.loads(text)\n\
          \        return parsed if isinstance(parsed, dict) else {}\n    except json.JSONDecodeError:\n\
          \        pass\n    start = text.find(\"{\")\n    if start < 0:\n       \
          \ return {}\n    depth = 0\n    for i in range(start, len(text)):\n    \
          \    ch = text[i]\n        if ch == \"{\":\n            depth += 1\n   \
          \     elif ch == \"}\":\n            depth -= 1\n            if depth ==\
          \ 0:\n                try:\n                    parsed = json.loads(text[start\
          \ : i + 1])\n                    return parsed if isinstance(parsed, dict)\
          \ else {}\n                except json.JSONDecodeError:\n              \
          \      return {}\n    return {}\n\n\ndef _unwrap_root(parsed: dict) -> dict:\n\
          \    if not isinstance(parsed, dict):\n        return {}\n    for key in\
          \ (\n        \"structured_output\",\n        \"structuredOutput\",\n   \
          \     \"output\",\n        \"result\",\n        \"data\",\n        \"json\"\
          ,\n    ):\n        inner = parsed.get(key)\n        if isinstance(inner,\
          \ dict) and (\n            \"outline\" in inner or \"outline_summary\" in\
          \ inner or \"volumes\" in inner\n        ):\n            return inner\n\
          \        if isinstance(inner, str) and inner.strip():\n            nested\
          \ = _unwrap_root(_parse_llm_json(inner))\n            if nested:\n     \
          \           return nested\n    return parsed\n\n\ndef _normalize_volumes_doc(parsed:\
          \ dict) -> tuple[str, dict]:\n    root = _unwrap_root(parsed)\n    summary\
          \ = str(root.get(\"outline_summary\") or \"\").strip()\n    outline = root.get(\"\
          outline\")\n    if isinstance(outline, dict) and isinstance(outline.get(\"\
          volumes\"), list):\n        return summary, outline\n    if isinstance(root.get(\"\
          volumes\"), list):\n        return summary, {\"volumes\": root[\"volumes\"\
          ]}\n    return summary, {\"volumes\": []}\n\n\ndef _count_chapters(doc:\
          \ dict) -> int:\n    n = 0\n    for vol in doc.get(\"volumes\") or []:\n\
          \        if isinstance(vol, dict) and isinstance(vol.get(\"chapters\"),\
          \ list):\n            n += len(vol[\"chapters\"])\n    return n\n\n\ndef\
          \ _pick_o1_raw(kwargs: dict) -> Any:\n    \"\"\"优先选用含 chapters/beats 的一路；避免空\
          \ structured_output 覆盖有效 text。\"\"\"\n    candidates: list[Any] = []\n \
          \   for key in (\"structured_output\", \"o1_result\", \"text\", \"o1_text\"\
          ):\n        val = kwargs.get(key)\n        if val is None:\n           \
          \ continue\n        if isinstance(val, str) and val.strip().lower() in (\"\
          null\", \"none\", \"\"):\n            continue\n        candidates.append(val)\n\
          \n    best: Any = \"\"\n    for val in candidates:\n        _, doc = _normalize_volumes_doc(_parse_llm_json(val))\n\
          \        if _count_chapters(doc) > 0:\n            return val\n        if\
          \ not best and val not in ({}, []):\n            best = val\n    return\
          \ best\n\n\ndef main(**kwargs: Any) -> dict:\n    raw = _pick_o1_raw(kwargs)\n\
          \    parsed = _parse_llm_json(raw)\n    summary, doc = _normalize_volumes_doc(parsed)\n\
          \n    if _count_chapters(doc) == 0:\n        for key in (\"structured_output\"\
          , \"o1_result\", \"text\", \"o1_text\"):\n            val = kwargs.get(key)\n\
          \            if val is None or val == raw:\n                continue\n \
          \           if isinstance(val, str) and val.strip().lower() in (\"null\"\
          , \"none\", \"\"):\n                continue\n            alt_summary, alt_doc\
          \ = _normalize_volumes_doc(_parse_llm_json(val))\n            if _count_chapters(alt_doc)\
          \ > 0:\n                summary, doc = alt_summary or summary, alt_doc\n\
          \                break\n\n    return {\n        \"outline_summary\": summary,\n\
          \        \"outline_json\": json.dumps(doc, ensure_ascii=False),\n    }\n"
        code_language: python3
