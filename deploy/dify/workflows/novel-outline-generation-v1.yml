    - data:
        code: "# AGG · Outline Validation Aggregate + Route\n#\n# === Dify 输入（4 项，均须绑定）===\n\
          #   validate_result ← O2 / text（String）\n#   retry_count     ← 开始 / retry_count\n\
          #   max_retry       ← 开始 / max_retry\n#   outline_json    ← O1X / outline_json（勿绑\
          \ O1.text）\n#\n# === Dify 输出（6 项）===\n#   route, retry_issues_formatted,\
          \ validation_report, outline_json → String\n#   retry_count → Number\n#\
          \   outline_valid → Boolean\n\nimport json\nimport re\nfrom typing import\
          \ Any\n\nTHINK_RE = re.compile(\n    r\"<(?:redacted_)?think(?:ing)?>[\\\
          s\\S]*?</(?:redacted_)?think(?:ing)?>\",\n    re.I,\n)\n\n\ndef _strip_think(text:\
          \ str) -> str:\n    return THINK_RE.sub(\"\", text or \"\").strip()\n\n\n\
          def _parse_llm_json(raw: Any) -> dict:\n    if isinstance(raw, dict):\n\
          \        return raw\n    if raw is None:\n        return {}\n    text =\
          \ _strip_think(str(raw).strip())\n    if not text or text.lower() in (\"\
          null\", \"none\"):\n        return {}\n    if text.startswith(\"```\"):\n\
          \        lines = text.split(\"\\n\")\n        text = \"\\n\".join(lines[1:-1]\
          \ if len(lines) > 2 else lines).strip()\n    try:\n        parsed = json.loads(text)\n\
          \        return parsed if isinstance(parsed, dict) else {}\n    except json.JSONDecodeError:\n\
          \        pass\n    start = text.find(\"{\")\n    end = text.rfind(\"}\"\
          )\n    if start >= 0 and end > start:\n        try:\n            parsed\
          \ = json.loads(text[start : end + 1])\n            return parsed if isinstance(parsed,\
          \ dict) else {}\n        except json.JSONDecodeError:\n            pass\n\
          \    return {}\n\n\ndef _to_int(value: Any, fallback: int = 0) -> int:\n\
          \    if value is None or str(value).strip().lower() in (\"null\", \"none\"\
          , \"\"):\n        return fallback\n    try:\n        return int(value)\n\
          \    except (TypeError, ValueError):\n        return fallback\n\n\ndef _as_bool(value:\
          \ Any) -> bool:\n    \"\"\"Dify/O2 可能返回 bool 或字符串 \\\"true\\\"/\\\"false\\\
          \"；勿用裸 bool(str)。\"\"\"\n    if isinstance(value, bool):\n        return\
          \ value\n    if isinstance(value, str):\n        return value.strip().lower()\
          \ in (\"true\", \"1\", \"yes\")\n    if isinstance(value, (int, float)):\n\
          \        return value != 0\n    return bool(value)\n\n\ndef _pick_validate_result(kwargs:\
          \ dict) -> Any:\n    for key in (\"validate_result\", \"validate_text\"\
          , \"text\", \"o2_result\"):\n        val = kwargs.get(key)\n        if val\
          \ is None:\n            continue\n        if isinstance(val, str) and val.strip().lower()\
          \ in (\"null\", \"none\", \"\"):\n            continue\n        return val\n\
          \    return \"{}\"\n\n\ndef _normalize_outline_json(raw: Any) -> str:\n\
          \    \"\"\"若误绑 O1 整段输出，尽量提取 { volumes }。\"\"\"\n    if raw is None:\n  \
          \      return \"{}\"\n    if isinstance(raw, dict):\n        if isinstance(raw.get(\"\
          volumes\"), list):\n            return json.dumps({\"volumes\": raw[\"volumes\"\
          ]}, ensure_ascii=False)\n        outline = raw.get(\"outline\")\n      \
          \  if isinstance(outline, dict) and isinstance(outline.get(\"volumes\"),\
          \ list):\n            return json.dumps(outline, ensure_ascii=False)\n \
          \   text = str(raw).strip()\n    if not text or text.lower() in (\"null\"\
          , \"none\"):\n        return \"{}\"\n    if \"outline_summary\" in text\
          \ or \"redacted_think\" in text.lower() or \"<think\" in text.lower():\n\
          \        parsed = _parse_llm_json(text)\n        outline = parsed.get(\"\
          outline\")\n        if isinstance(outline, dict) and isinstance(outline.get(\"\
          volumes\"), list):\n            return json.dumps(outline, ensure_ascii=False)\n\
          \        if isinstance(parsed.get(\"volumes\"), list):\n            return\
          \ json.dumps({\"volumes\": parsed[\"volumes\"]}, ensure_ascii=False)\n \
          \   try:\n        parsed = json.loads(text)\n        if isinstance(parsed,\
          \ dict) and isinstance(parsed.get(\"volumes\"), list):\n            return\
          \ json.dumps(parsed, ensure_ascii=False)\n    except json.JSONDecodeError:\n\
          \        pass\n    return text\n\n\ndef _count_chapters(outline_json: str)\
          \ -> int:\n    try:\n        doc = json.loads(outline_json) if isinstance(outline_json,\
          \ str) else outline_json\n    except json.JSONDecodeError:\n        return\
          \ 0\n    if not isinstance(doc, dict):\n        return 0\n    n = 0\n  \
          \  for vol in doc.get(\"volumes\") or []:\n        if isinstance(vol, dict)\
          \ and isinstance(vol.get(\"chapters\"), list):\n            n += len(vol[\"\
          chapters\"])\n    return n\n\n\ndef _o1x_empty_outputs(retry_count: int,\
          \ max_retry: int, outline_json: str) -> dict:\n    issue = (\n        \"\
          - [hard] global: O1X outline_json 无有效章节（volumes/chapters 为空）。\"\n      \
          \  \"请检查：① O1 开启 Structured Output 并粘贴 o1-outline.output.json；\"\n     \
          \   \"② O1X 输入绑定 O1.text；③ O2 outline_json 绑定 O1X.outline_json（勿绑 O1.text）\"\
          \n    )\n    new_retry = retry_count + 1 if retry_count < max_retry else\
          \ retry_count\n    route = \"retry\" if retry_count < max_retry else \"\
          circuit_break\"\n    report = {\n        \"outline_valid\": False,\n   \
          \     \"outline_issues\": [\n            {\n                \"severity\"\
          : \"hard\",\n                \"location\": \"global\",\n               \
          \ \"message\": \"O1X 未返回有效章节结构，见 retry_issues_formatted\",\n           \
          \ }\n        ],\n        \"structure_score\": 0,\n        \"beat_quality_score\"\
          : 0,\n        \"lore_consistency_score\": 0,\n        \"chapter_count_ok\"\
          : False,\n        \"volume_balance_ok\": False,\n    }\n    return {\n \
          \       \"route\": route,\n        \"retry_count\": int(new_retry),\n  \
          \      \"retry_issues_formatted\": issue,\n        \"outline_valid\": False,\n\
          \        \"validation_report\": json.dumps(report, ensure_ascii=False),\n\
          \        \"outline_json\": outline_json,\n    }\n\n\ndef _empty_outputs(retry_count:\
          \ int = 0, outline_json: str = \"{}\") -> dict:\n    return {\n        \"\
          route\": \"retry\",\n        \"retry_count\": retry_count,\n        \"retry_issues_formatted\"\
          : \"- [hard] global: O2 未返回有效校验 JSON（validate_result 为空）\",\n        \"\
          outline_valid\": False,\n        \"validation_report\": \"{}\",\n      \
          \  \"outline_json\": outline_json,\n    }\n\n\ndef main(**kwargs: Any) ->\
          \ dict:\n    try:\n        validate_result = _pick_validate_result(kwargs)\n\
          \        raw_outline = kwargs.get(\"outline_json\") or kwargs.get(\"o1_result\"\
          ) or \"{}\"\n        outline_json = _normalize_outline_json(raw_outline)\n\
          \        retry_count = _to_int(kwargs.get(\"retry_count\"), 0)\n       \
          \ max_retry = _to_int(kwargs.get(\"max_retry\"), 3)\n\n        if _count_chapters(outline_json)\
          \ == 0:\n            return _o1x_empty_outputs(retry_count, max_retry, outline_json)\n\
          \n        v = _parse_llm_json(validate_result)\n        if not v:\n    \
          \        out = _empty_outputs(retry_count, outline_json)\n            if\
          \ retry_count >= max_retry:\n                out[\"route\"] = \"circuit_break\"\
          \n            else:\n                out[\"retry_count\"] = retry_count\
          \ + 1\n            return out\n\n        valid = _as_bool(v.get(\"outline_valid\"\
          , False))\n        issues = v.get(\"outline_issues\") or []\n\n        if\
          \ valid:\n            route = \"continue\"\n            new_retry = retry_count\n\
          \        elif retry_count < max_retry:\n            route = \"retry\"\n\
          \            new_retry = retry_count + 1\n        else:\n            route\
          \ = \"circuit_break\"\n            new_retry = retry_count\n\n        formatted\
          \ = []\n        for item in issues[:12]:\n            if isinstance(item,\
          \ dict):\n                formatted.append(\n                    f\"- [{item.get('severity',\
          \ 'warn')}] {item.get('location', '')}: {item.get('message', '')}\"\n  \
          \              )\n            else:\n                formatted.append(f\"\
          - {item}\")\n\n        return {\n            \"route\": route,\n       \
          \     \"retry_count\": int(new_retry),\n            \"retry_issues_formatted\"\
          : \"\\n\".join(formatted),\n            \"outline_valid\": bool(valid),\n\
          \            \"validation_report\": json.dumps(v, ensure_ascii=False),\n\
          \            \"outline_json\": outline_json,\n        }\n    except Exception:\n\
          \        return _empty_outputs(_to_int(kwargs.get(\"retry_count\"), 0))\n"
