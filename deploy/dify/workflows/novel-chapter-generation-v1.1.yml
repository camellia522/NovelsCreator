            \ [\r\n    {\r\n      \"name\": string,\r\n      \"worldview_ok\": boolean,\r\
            \n      \"values_ok\": boolean,\r\n      \"speech_ok\": boolean,\r\n \
            \     \"appearance_ok\": boolean,\r\n      \"motivation_ok\": boolean,\r\
            \n      \"notes\": string\r\n    }\r\n  ],\r\n  \"world_rules_violations\"\
            : string[],\r\n  \"unauthorized_expansions\": string[],\r\n  \"continuity_conflicts\"\
            : string[],\r\n  \"reviewer_summary\": string\r\n}\r\n\r\n\r\n\r\n\r\n\
            \r\ncharacter_checks：覆盖 merged_context 中本章应出场的所有主要角色（wizard characters\
