    - data:
        code: "# END_OK · Success Output Assembler\n# 输入：novel_body, video_script,\
          \ memory_patch, retry_count, outline_valid, lore_valid\n# memory_patch：N5\
          \ 结构化 dict、JSON 字符串，或含 redacted_thinking 的 LLM text\n\nimport json\nimport\
          \ re\nfrom typing import Any, Union\n\nTHINK_RE = re.compile(r\"<(?:redacted_)?think>[\\\
          s\\S]*?</(?:redacted_)?think>\", re.I)\n\n\ndef strip_think(text: str) ->\
          \ str:\n    return THINK_RE.sub(\"\", text or \"\").strip()\n\n\ndef extract_json_object(text:\
          \ str) -> dict:\n    s = strip_think(text).strip()\n    if not s:\n    \
          \    return {}\n    if s.startswith(\"```\"):\n        lines = s.split(\"\
          \\n\")\n        s = \"\\n\".join(lines[1:-1] if len(lines) > 2 else lines).strip()\n\
          \    start = s.find(\"{\")\n    if start < 0:\n        return {}\n    depth\
          \ = 0\n    for i in range(start, len(s)):\n        ch = s[i]\n        if\
          \ ch == \"{\":\n            depth += 1\n        elif ch == \"}\":\n    \
          \        depth -= 1\n            if depth == 0:\n                try:\n\
          \                    parsed = json.loads(s[start : i + 1])\n           \
          \         return parsed if isinstance(parsed, dict) else {}\n          \
          \      except json.JSONDecodeError:\n                    return {}\n   \
          \ return {}\n\n\ndef parse_memory_patch(raw: Union[str, dict, None]) ->\
          \ dict:\n    if raw is None:\n        return {}\n    if isinstance(raw,\
          \ dict):\n        if raw.get(\"chapterSummary\") or raw.get(\"globalSummaryDelta\"\
          ) or raw.get(\"foreshadowingUpdates\"):\n            return raw\n      \
          \  inner = raw.get(\"text\")\n        if isinstance(inner, str) and inner.strip():\n\
          \            return extract_json_object(inner)\n        return raw\n   \
          \ text = str(raw).strip()\n    if not text:\n        return {}\n    if text.startswith(\"\
          {\"):\n        try:\n            parsed = json.loads(text)\n           \
          \ return parsed if isinstance(parsed, dict) else extract_json_object(text)\n\
          \        except json.JSONDecodeError:\n            return extract_json_object(text)\n\
          \    return extract_json_object(text)\n\n\ndef main(\n    novel_body: str,\n\
          \    video_script: str,\n    memory_patch: Any = \"\",\n    retry_count:\
          \ int = 0,\n    outline_valid: bool = True,\n    lore_valid: bool = True,\n\
          ) -> dict:\n    patch = parse_memory_patch(memory_patch)\n    end_outputs\
          \ = {\n        \"status\": \"success\",\n        \"circuit_break\": False,\n\
          \        \"human_action_required\": False,\n        \"retry_count\": retry_count,\n\
          \        \"novel_body\": novel_body or \"\",\n        \"video_script\":\
          \ video_script or \"\",\n        \"memory_patch\": patch,\n        \"validation_report\"\
          : {\n            \"outline_valid\": outline_valid,\n            \"lore_valid\"\
          : lore_valid,\n            \"issues\": [],\n        },\n        \"workflow_version\"\
          : \"novel-chapter-generation-v1.1\",\n    }\n    return {\"end_outputs\"\
          : json.dumps(end_outputs, ensure_ascii=False)}\n"
        code_language: python3
