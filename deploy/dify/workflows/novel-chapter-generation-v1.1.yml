          role: user
          text: '═══════════════════════════════════════ 【本章定稿正文 · Canonical Chapter
            Text】 ═══════════════════════════════════════

            {{#1780370481160.text#}}

            ═══════════════════════════════════════ 【现有记忆库 · Existing Plot Memory】
            ═══════════════════════════════════════

            {{#1780319308559.plot_memory#}}

            ═══════════════════════════════════════ 【章节标识】 ═══════════════════════════════════════

            chapterId: {{#1780319308559.chapter_id#}}

            title: {{#1780319308559.chapter_title#}}

            ═══════════════════════════════════════ 【Archive Patch 生成规范】 ═══════════════════════════════════════

            1. chapterSummary.summary（150–400 汉字）

            采用第三人称客观叙述，过去式或现在式全章统一；

            结构建议：开篇状态 → 核心冲突经过 → 结尾状态/悬念；

            禁止：「本章讲述了」「作者意图」「读者将会看到」；

            必须包含：时地变化、关键转折、结尾悬念（若有）。

            2. chapterSummary.keyEvents（3–8 条）

            每条 8–25 字，动词开头，描述不可逆或高信息量事件；

            按时间顺序排列；

            不记录纯心理活动，除非心理活动直接导致行为变化。

            3. chapterSummary.characterStates

            覆盖本章所有主要出场角色的结尾状态（物理/情绪/关系/持有物/认知变化）；

            state 字段须具体：「左臂轻伤，已确认剑客口诀与师门有关」优于「很困惑」；

            characterId 未知时填 "unknown"，name 必填。

            4. chapterSummary.openThreads

            列出本章新埋设或仍未解决的悬念/伏笔/承诺；

            已在本章解决的不列入；

            每条须可被后续章节验证是否 resolved。

            5. globalSummaryDelta（1–3 句，50–120 字）

            描述本章对全书主线的增量贡献；

            将 append 至 globalSummary，须自成逻辑，不依赖「上一章」指代；

            不重复 chapterSummary 全文。

            6. foreshadowingUpdates

            新伏笔：生成唯一 id（fs-{chapter_id}-{序号}），resolved: false；

            已揭示伏笔：同 id，resolved: true，description 补充揭示方式；

            若无伏笔更新，输出空数组 []。

            7. 一致性约束

            不得与 Existing Plot Memory 中已记录事实矛盾；

            若正文似乎 contradict memory，在 reviewer_internal_note 字段说明（该字段可选，仅用于调试，客户端可忽略）。

            ═══════════════════════════════════════ 【输出 JSON Schema】 ═══════════════════════════════════════

            {”chapterSummary“:“{{#1780319308559.chapter_id#}}", "title": "{{#1780319308559.chapter_title#}}",
            "summary": string, "keyEvents": string[], "characterStates": [ { "characterId":
            string, "name": string, "state": string } ], "openThreads": string[] },
            "globalSummaryDelta": string, "foreshadowingUpdates": [ { "id": string,
            "plantedIn": string, "description": string, "resolved": boolean } ] }

            只输出 JSON，不要任何其他文字。'
