            \n\r\n三、设定边界（Canon Expansion Boundary）— Hard Fail 条件\r\n\r\n\r\n\r\n\r\
            \n\r\n是否引入新的具名重要角色（有独立姓名 + 推动情节的功能），且不在 merged_context 任何角色列表中；\r\n\r\n\
            \r\n\r\n是否引入新的重要势力/组织（非路人团体），且无 knowledge factions 授权；\r\n\r\n\r\n\r\n\
            是否引入新的关键道具/能力（影响情节走向），且无 items 或 world.rules 授权；\r\n\r\n\r\n\r\n不判 fail：无名路人、背景店铺、一次性龙套、环境性群体。\r\
            \n\r\n四、前情连续性（Continuity）— Hard Fail 条件\r\n\r\n\r\n\r\n\r\n\r\n与 plot_memory\
            \ 中已记录事实直接矛盾；\r\n\r\n\r\n\r\n已 resolved 的 foreshadowing 被当作未揭示处理（若 memory\
            \ 中有记录）。\r\n\r\n五、整体判定 lore_valid\r\n\r\n\r\n\r\n\r\n\r\n任一主要角色任一 hard\
            \ fail 维度为 false，或触发二/三/四类 Hard Fail → lore_valid = false；\r\n\r\n\r\n\
            \r\nlore_issues 须具体：「【人物·张三】values_ok：第 X 段接受贿赂与其正义价值观冲突，无铺垫」。\r\n\r\n\
            \r\n\r\n═══════════════════════════════════════\r\n【输出规范 · JSON Schema】\r\
            \n═══════════════════════════════════════\r\n\r\n{\r\n  \"lore_valid\"\
