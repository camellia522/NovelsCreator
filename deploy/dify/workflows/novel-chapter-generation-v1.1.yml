            1. 解析配置

            读取 outputFormat：json 或 delimited；

            读取 columns 数组顺序：delimited 模式下列顺序必须与数组一致；

            读取 shotCount.min / shotCount.max（缺省则 8–28）；镜头数须落在此区间；

            读取 estimatedDurationSec（缺省 180）：若存在 duration / duration_sec 类整型列，各镜头之和应接近该值
            ±20%。

            2. 逐列填充（对每个镜头）

            对 columns 中每一项：

            type

            规则

            string / text

            满足 description、minLength/maxLength；text 可较长但 delimited 模式内单行

            integer / number

            满足 minimum/maximum；duration 类通常 3–15

            boolean

            仅 true 或 false

            enum

            必须为 options 中之一，大小写一致

            required=false 且无内容

            使用 emptyValue 或 NONE

            3. outputFormat = json 时的输出形状（唯一合法结构）

            输出单个 JSON 对象，不要包裹在 markdown 围栏中：

            { "templateId": "<与配置 templateId 相同>", "chapterId": "


            ", "chapterTitle": "


            ", "estimatedDurationSec":


            , "shots": [ { "<columns[0].key>":


            , "<columns[1].key>":


            , ... }, ... ] }


            shots 数组长度在 shotCount 区间内；

            每个 shot 对象仅包含 columns 中定义的 key，required 列不可省略；

            字符串值使用 UTF-8，JSON 内须正确转义。

            4. outputFormat = delimited 时的输出形状

            若 includeHeader 为 true（默认）：第一行为各列 key，以 delimiter 连接；

            随后每行一个镜头，字段顺序与 columns 一致，以 delimiter 连接；

            字段值内不得出现 delimiter 字符或换行符；

            不要输出 JSON、Markdown 表格、标题行。

            5. globalRules

            若配置中存在 globalRules 数组，逐条视为 Hard Constraints。

            6. 禁止

            改写润色稿核心情节；新增配置与源文本均未授权的重要角色/道具；

            输出配置外字段；enum 外取值；delimited 模式多行空行或注释行。

            请根据 VideoTemplateConfig 立即生成完整视频脚本。只输出符合 outputFormat 的正文，不要任何其他文字。'
