            1. 输出结构

            文件首行（标题行）：

            视频脚本 · {{#1780319308559.chapter_title#}}

            随后每个镜头为一个独立块，格式如下（字段名不可更改）：

            【镜头 S{三位序号}】 时长：{整数秒}s 景别：{远景/全景/中景/近景/特写/大特写} 机位：{固定/推/拉/摇/移/跟/升降/手持}
