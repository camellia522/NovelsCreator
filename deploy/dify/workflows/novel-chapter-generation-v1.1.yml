    - data:
        code: "# AGG · Validation Aggregate + Retry Router\n# 输入：outline_result, lore_result,\
          \ retry_count, max_retry, draft_text\n# 兼容 Dify 误绑名：outline_text / lore_text\n\
          # 输出：route, retry_count, retry_issues, merged_issues_for_polish, outline_valid,\
          \ lore_valid\n\nimport json\nimport re\n\nTHINK_BLOCK_RE = re.compile(\n\
          \    r\"<(?:redacted_)?think>.*?</(?:redacted_)?think>\",\n    re.DOTALL\
          \ | re.IGNORECASE,\n)\n\n\ndef strip_think_blocks(text: str) -> str:\n \
          \   return THINK_BLOCK_RE.sub(\"\", text).strip()\n\n\ndef parse_llm_json(raw:\
          \ str) -> dict:\n    if not raw:\n        return {}\n    text = strip_think_blocks(raw.strip())\n\
          \    if text.startswith(\"```\"):\n        lines = text.split(\"\\n\")\n\
          \        text = \"\\n\".join(lines[1:-1] if len(lines) > 2 else lines)\n\
          \    try:\n        return json.loads(text)\n    except json.JSONDecodeError:\n\
          \        pass\n    start = text.rfind(\"{\")\n    end = text.rfind(\"}\"\
          )\n    if start != -1 and end > start:\n        try:\n            return\
          \ json.loads(text[start : end + 1])\n        except json.JSONDecodeError:\n\
          \            pass\n    return {}\n\n\ndef main(\n    outline_result: str\
          \ = \"\",\n    lore_result: str = \"\",\n    retry_count: int = 0,\n   \
          \ max_retry: int = 3,\n    draft_text: str = \"\",\n    outline_text: str\
          \ = \"\",\n    lore_text: str = \"\",\n) -> dict:\n    o = parse_llm_json(outline_result\
          \ or outline_text)\n    l = parse_llm_json(lore_result or lore_text)\n\n\
          \    outline_valid = bool(o.get(\"outline_valid\", False))\n    lore_valid\
          \ = bool(l.get(\"lore_valid\", False))\n\n    outline_issues = o.get(\"\
          outline_issues\") or []\n    lore_issues = l.get(\"lore_issues\") or []\n\
          \    merged_issues = list(outline_issues) + list(lore_issues)\n\n    retry_issues_json\
          \ = json.dumps(merged_issues, ensure_ascii=False)\n    merged_issues_for_polish\
          \ = \"\\n\".join(f\"- {x}\" for x in merged_issues) if merged_issues else\
          \ \"（无）\"\n\n    if outline_valid and lore_valid:\n        route = \"continue\"\
          \n        new_retry_count = retry_count\n    elif retry_count < max_retry:\n\
          \        route = \"retry\"\n        new_retry_count = retry_count + 1\n\
          \    else:\n        route = \"circuit_break\"\n        new_retry_count =\
          \ retry_count\n\n    return {\n        \"route\": route,\n        \"retry_count\"\
          : new_retry_count,\n        \"retry_issues\": retry_issues_json,\n     \
          \   \"retry_issues_formatted\": merged_issues_for_polish,\n        \"merged_issues_for_polish\"\
          : merged_issues_for_polish,\n        \"outline_valid\": outline_valid,\n\
          \        \"lore_valid\": lore_valid,\n    }\n"
        code_language: python3
