    - data:
        code: "# P0 · Context Merge\n# Dify Code 节点 · 语言 Python3\n# 输入变量：generation_prompt,\
          \ knowledge_snapshot, outline_beats, generation_prompt_text(可选)\n# 输出变量：merged_context,\
          \ effective_beats, has_wizard, chapter_goal\n\nimport json\n\n\ndef safe_json(s:\
          \ str, default=None):\n    if not s or not str(s).strip():\n        return\
          \ default if default is not None else {}\n    try:\n        return json.loads(s)\n\
          \    except json.JSONDecodeError:\n        return default if default is\
          \ not None else {}\n\n\ndef find_char(characters, char_id, name):\n    for\
          \ c in characters or []:\n        if char_id and c.get(\"id\") == char_id:\n\
          \            return c\n        if name and c.get(\"name\") == name:\n  \
          \          return c\n    return None\n\n\ndef main(generation_prompt: str,\
          \ knowledge_snapshot: str, outline_beats: str) -> dict:\n    gp = safe_json(generation_prompt,\
          \ None)\n    ks = safe_json(knowledge_snapshot, {})\n    beats = safe_json(outline_beats,\
          \ [])\n\n    if gp and gp.get(\"plot\") and gp[\"plot\"].get(\"beats\"):\n\
          \        effective_beats = gp[\"plot\"][\"beats\"]\n        chapter_goal\
          \ = gp[\"plot\"].get(\"chapterGoal\", \"\")\n    else:\n        effective_beats\
          \ = beats if isinstance(beats, list) else []\n        chapter_goal = \"\"\
          \n\n    characters = []\n    if gp and gp.get(\"characters\"):\n       \
          \ for wc in gp[\"characters\"]:\n            kb = find_char(ks.get(\"characters\"\
          , []), wc.get(\"id\"), wc.get(\"name\"))\n            merged = dict(wc)\n\
          \            if kb:\n                merged[\"relationships\"] = kb.get(\"\
          relationships\", [])\n                merged[\"factionId\"] = kb.get(\"\
          factionId\")\n                merged[\"arc\"] = kb.get(\"arc\")\n      \
          \      characters.append(merged)\n    else:\n        characters = ks.get(\"\
          characters\", [])\n\n    world = dict(ks.get(\"world\") or {})\n    wizard_env\
          \ = gp.get(\"environment\") if gp else None\n\n    merged = {\n        \"\
          has_wizard\": gp is not None,\n        \"world\": world,\n        \"wizard_env\"\
          : wizard_env,\n        \"characters\": characters,\n        \"factions\"\
          : ks.get(\"factions\", []),\n        \"items\": ks.get(\"items\", []),\n\
          \    }\n\n    return {\n        \"merged_context\": json.dumps(merged, ensure_ascii=False),\n\
          \        \"effective_beats\": json.dumps(effective_beats, ensure_ascii=False),\n\
          \        \"has_wizard\": \"true\" if gp else \"false\",\n        \"chapter_goal\"\
          : chapter_goal or \"\",\n    }\n"
        code_language: python3
        outputs:
