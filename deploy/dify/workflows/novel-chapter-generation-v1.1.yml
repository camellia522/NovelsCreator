    - data:
        code: "# PARSE · End Outputs Flattener（章节工作流 END 前最后一环 Code 节点）\n# 勿与 end_success.py\
          \ / n5_parse_memory_patch.py 混用。\n#\n# Dify 入参（均可选，非必填 + 默认 \"\"）：\n#  \
          \ re_end_outputs / cb_end_outputs / ok_end_outputs / end_outputs\n# 单次 run\
          \ 仅 RE / CB / END_OK 之一有值，其余为空属正常。\n\nimport json\nimport re\nfrom typing\
          \ import Any\n\nTHINK_RE = re.compile(r\"<(?:redacted_)?think>[\\s\\S]*?</(?:redacted_)?think>\"\
          , re.I)\n\n\ndef _coerce_end_outputs(value: Any) -> str:\n    if value is\
          \ None:\n        return \"\"\n    if isinstance(value, dict):\n        return\
          \ json.dumps(value, ensure_ascii=False)\n    text = str(value).strip()\n\
          \    if not text or text in (\"None\", \"null\"):\n        return \"\"\n\
          \    return text\n\n\ndef _pick_raw(*candidates: Any) -> str:\n    for candidate\
          \ in candidates:\n        text = _coerce_end_outputs(candidate)\n      \
          \  if text:\n            return text\n    return \"\"\n\n\ndef _strip_think(text:\
          \ str) -> str:\n    return THINK_RE.sub(\"\", text or \"\").strip()\n\n\n\
          def _extract_json_object(text: str) -> dict:\n    s = _strip_think(text).strip()\n\
          \    if not s:\n        return {}\n    if s.startswith(\"```\"):\n     \
          \   lines = s.split(\"\\n\")\n        s = \"\\n\".join(lines[1:-1] if len(lines)\
