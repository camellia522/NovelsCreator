    - data:
        code: "# W2SX · Extract society JSON from W2S LLM output\n# 解析 world_rules\
          \ / nations / locations，并输出 society_json 供 END 节点\n#\n# Dify「输出变量」须与 main()\
          \ return 键名、类型完全一致（均 String），共 4 个：\n# society_json, world_rules, nations_json,\
          \ locations_json\n\nimport json\nfrom typing import Any, Union\n\n\ndef\
          \ _strip_thinking(text: str) -> str:\n    low = text.lower()\n    end_tags\
          \ = (\n        \"</\" + \"think\" + \">\",\n        \"</\" + \"redacted_thinking\"\
          \ + \">\",\n    )\n    for end_tag in end_tags:\n        pos = low.find(end_tag)\n\
          \        if pos >= 0:\n            text = text[pos + len(end_tag) :]\n \
          \           low = text.lower()\n    return text.strip()\n\n\ndef parse_json(raw:\
          \ Union[str, dict, None], fallback):\n    if raw is None:\n        return\
          \ fallback\n    if isinstance(raw, (dict, list)):\n        return raw\n\
          \    text = _strip_thinking(str(raw).strip())\n    if not text or text in\
          \ (\"{}\", \"[]\", \"null\", \"None\"):\n        return fallback\n    if\
          \ text.startswith(\"```\"):\n        lines = text.split(\"\\n\")\n     \
          \   text = \"\\n\".join(lines[1:-1] if len(lines) > 2 else lines)\n    try:\n\
          \        return json.loads(text)\n    except json.JSONDecodeError:\n   \
          \     start, end = text.find(\"{\"), text.rfind(\"}\")\n        if start\
          \ >= 0 and end > start:\n            try:\n                return json.loads(text[start\
          \ : end + 1])\n            except json.JSONDecodeError:\n              \
          \  pass\n        return fallback\n\n\ndef _normalize_root(parsed: Any) ->\
          \ dict:\n    if isinstance(parsed, list):\n        for item in parsed:\n\
          \            if isinstance(item, dict):\n                parsed = item\n\
          \                break\n        else:\n            return {}\n    if not\
          \ isinstance(parsed, dict):\n        return {}\n    for key in (\"output\"\
          , \"result\", \"data\", \"society\"):\n        inner = parsed.get(key)\n\
          \        if isinstance(inner, dict) and (\n            \"nations\" in inner\
          \ or \"locations\" in inner or \"world_rules\" in inner\n        ):\n  \
          \          return inner\n    return parsed\n\n\ndef main(w2s_json: str =\
          \ \"\") -> dict:\n    root = _normalize_root(parse_json(w2s_json, {}))\n\
          \    world_rules = str(root.get(\"world_rules\") or \"\").strip()\n    nations\
          \ = root.get(\"nations\") or []\n    locations = root.get(\"locations\"\
          ) or []\n    if not isinstance(nations, list):\n        nations = []\n \
          \   if not isinstance(locations, list):\n        locations = []\n\n    society\
          \ = {\n        \"world_rules\": world_rules,\n        \"nations\": nations,\n\
          \        \"locations\": locations,\n    }\n    return {\n        \"society_json\"\
          : json.dumps(society, ensure_ascii=False),\n        \"world_rules\": world_rules,\n\
          \        \"nations_json\": json.dumps(nations, ensure_ascii=False),\n  \
          \      \"locations_json\": json.dumps(locations, ensure_ascii=False),\n\
          \    }\n"
        code_language: python3
        outputs:
          locations_json:
            children: null
            type: string
          nations_json:
            children: null
            type: string
          society_json:
            children: null
            type: string
          world_rules:
            children: null
            type: string
        selected: false
        title: 'W2SX '
        type: code
        variables:
        - value_selector:
          - '1780545622526'
          - text
