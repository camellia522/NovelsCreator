    - data:
        code: "# END_OK · World Society Success Assembler (Dify 代码节点)\n#\n# 【输入变量】类型均为\
          \ String（JSON 内容也是字符串），建议全部绑定 W2SX：\n#   society_json, world_rules, nations_json,\
          \ locations_json, workflow_version\n# 可选：w2sx_bundle — 若 Dify 将 W2SX 四字段合成一个\
          \ JSON 字符串再传入\n#\n# 【输出变量】只登记 2 个，类型 String：\n#   end_outputs, end_outputs_（内容相同，兼容不同画布命名）\n\
          #\n# 勿将 society_json / locations_json 登记为 END_OK 的「输出」，否则会报\n# Not all output\
          \ parameters are validated\n\nimport json\nfrom typing import Any, Union\n\
          \nWORKFLOW_VERSION_DEFAULT = \"world-society-v1\"\n\n\ndef _is_empty(raw:\
          \ Any) -> bool:\n    if raw is None:\n        return True\n    if isinstance(raw,\
          \ str):\n        t = raw.strip()\n        return not t or t.lower() in (\"\
          null\", \"none\", \"{}\")\n    return False\n\n\ndef parse_json_str(raw:\
          \ Union[str, dict, list, None], fallback: Any) -> Any:\n    if raw is None:\n\
          \        return fallback\n    if isinstance(raw, (dict, list)):\n      \
          \  return raw\n    text = str(raw).strip()\n    if not text or text.lower()\
          \ in (\"null\", \"none\"):\n        return fallback\n    if text.startswith(\"\
          ```\"):\n        lines = text.split(\"\\n\")\n        text = \"\\n\".join(lines[1:-1]\
          \ if len(lines) > 2 else lines)\n    try:\n        return json.loads(text)\n\
          \    except json.JSONDecodeError:\n        start, end = text.find(\"{\"\
          ), text.rfind(\"}\")\n        if start >= 0 and end > start:\n         \
          \   try:\n                return json.loads(text[start : end + 1])\n   \
          \         except json.JSONDecodeError:\n                pass\n        start,\
          \ end = text.find(\"[\"), text.rfind(\"]\")\n        if start >= 0 and end\
          \ > start:\n            try:\n                return json.loads(text[start\
          \ : end + 1])\n            except json.JSONDecodeError:\n              \
          \  pass\n        return fallback\n\n\ndef _as_list(raw: Any) -> list:\n\
          \    if isinstance(raw, list):\n        return raw\n    parsed = parse_json_str(raw,\
          \ [])\n    return parsed if isinstance(parsed, list) else []\n\n\ndef _merge_w2sx_bundle(bundle:\
          \ Any) -> dict[str, Any]:\n    \"\"\"从 w2sx_bundle 或已是 dict 的上游对象读取字段。\"\
          \"\"\n    if isinstance(bundle, dict):\n        data = bundle\n    else:\n\
          \        data = parse_json_str(bundle, {})\n    if not isinstance(data,\
          \ dict):\n        return {}\n    out: dict[str, Any] = {}\n    for key in\
          \ (\"society_json\", \"world_rules\", \"nations_json\", \"locations_json\"\
          ):\n        if key in data and not _is_empty(data.get(key)):\n         \
          \   out[key] = data[key]\n    return out\n\n\ndef _pick_list(society_val:\
          \ Any, separate_json: Any) -> list:\n    sep = _as_list(separate_json)\n\
          \    if len(sep) > 0:\n        return sep\n    if isinstance(society_val,\
          \ list) and len(society_val) > 0:\n        return society_val\n    return\
          \ []\n\n\ndef _build_packed(\n    society_json: Any = \"\",\n    world_rules:\
          \ Any = \"\",\n    nations_json: Any = \"[]\",\n    locations_json: Any\
          \ = \"[]\",\n    workflow_version: Any = \"\",\n    w2sx_bundle: Any = \"\
          \",\n) -> tuple[dict[str, Any], dict[str, Any]]:\n    merged = _merge_w2sx_bundle(w2sx_bundle)\n\
          \n    sj = merged.get(\"society_json\", society_json)\n    wr_in = merged.get(\"\
          world_rules\", world_rules)\n    nj_in = merged.get(\"nations_json\", nations_json)\n\
          \    lj_in = merged.get(\"locations_json\", locations_json)\n\n    society\
          \ = parse_json_str(sj, {})\n    if isinstance(society, str):\n        society\
          \ = parse_json_str(society, {})\n    if not isinstance(society, dict):\n\
          \        society = {}\n\n    wr = str(wr_in or society.get(\"world_rules\"\
          ) or \"\").strip()\n    nations = _pick_list(society.get(\"nations\"), nj_in)\n\
          \    locations = _pick_list(society.get(\"locations\"), lj_in)\n\n    packed\
          \ = {\n        \"world_rules\": wr,\n        \"nations\": nations,\n   \
          \     \"locations\": locations,\n    }\n\n    has_data = bool(wr) or len(nations)\
          \ > 0 or len(locations) > 0\n    status = \"success\" if has_data else \"\
          error\"\n    error_message = \"\"\n    if not has_data:\n        error_message\
          \ = (\n            \"END_OK 未收到 W2SX 数据：请检查 society_json/world_rules/nations_json/\"\
          \n            \"locations_json 是否绑定到 W2SX 对应输出，且勿单独运行 END_OK（输入为 null）。\"\
          \n        )\n\n    wv = str(workflow_version or WORKFLOW_VERSION_DEFAULT).strip()\
          \ or WORKFLOW_VERSION_DEFAULT\n\n    end_outputs = {\n        \"status\"\
          : status,\n        \"society_json\": json.dumps(packed, ensure_ascii=False),\n\
          \        \"world_rules\": wr,\n        \"nations_json\": json.dumps(nations,\
          \ ensure_ascii=False),\n        \"locations_json\": json.dumps(locations,\
          \ ensure_ascii=False),\n        \"workflow_version\": wv,\n        \"error_message\"\
          : error_message,\n    }\n    return packed, end_outputs\n\n\ndef _pack_return(end_outputs:\
          \ dict[str, Any]) -> dict[str, str]:\n    packed_str = json.dumps(end_outputs,\
          \ ensure_ascii=False)\n    return {\n        \"end_outputs\": packed_str,\n\
          \        \"end_outputs_\": packed_str,\n    }\n\n\ndef main(\n    society_json:\
          \ Any = \"\",\n    world_rules: Any = \"\",\n    nations_json: Any = \"\
          []\",\n    locations_json: Any = \"[]\",\n    workflow_version: Any = WORKFLOW_VERSION_DEFAULT,\n\
          \    w2sx_bundle: Any = \"\",\n) -> dict[str, str]:\n    try:\n        _,\
          \ end_outputs = _build_packed(\n            society_json=society_json,\n\
          \            world_rules=world_rules,\n            nations_json=nations_json,\n\
          \            locations_json=locations_json,\n            workflow_version=workflow_version,\n\
          \            w2sx_bundle=w2sx_bundle,\n        )\n        return _pack_return(end_outputs)\n\
          \    except Exception as exc:\n        err = {\n            \"status\":\
          \ \"error\",\n            \"society_json\": json.dumps(\n              \
          \  {\"world_rules\": \"\", \"nations\": [], \"locations\": []},\n      \
          \          ensure_ascii=False,\n            ),\n            \"world_rules\"\
          : \"\",\n            \"nations_json\": \"[]\",\n            \"locations_json\"\
          : \"[]\",\n            \"workflow_version\": WORKFLOW_VERSION_DEFAULT,\n\
          \            \"error_message\": f\"END_OK 异常: {exc}\",\n        }\n    \
          \    return _pack_return(err)\n"
