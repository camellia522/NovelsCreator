            \n\r\n- localDraftLocations / adminProvinces.seats 中每条 id/x/y/type/terrain/nationId\
            \ 必须原样出现在输出 locations 中\r\n\r\n- 润色 nations[].name、locations[].name/description，以及\
            \ nations 政体/文化/简介与 **world_rules（世界背景，非技术参数）**\r\n\r\n- **world_rules**：根据\
            \ era / atmosphere / scale / climate 与 authorCreativeBrief 写 300–600 字世界背景；勿写分辨率、板块、海平面、算法流程；placementSummary\
            \ 勿照抄\r\n\r\n- **分批**：第 1 批必须输出 world_rules；第 2 批及以后 world_rules 为 \"\"\
            \r\n\r\n- **国名**：必须润色 `nations[].name`；遵循 `place_naming_style` / `naming_style_hint`\
            \ 与各国 `nationNamingStyle`；`polishNationName=true` 勿留占位国名\r\n\r\n- **地名风格**：与\
            \ `place_naming_style` 一致；混合模式同国城市语种一致\r\n\r\n- **方位**：多数城名不必含东/西/南/北；若使用方位字，须与\
            \ `compassHint`、`x/y` 一致（西境不得用「东」）"
