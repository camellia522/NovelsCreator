            \n{% endif %}\r\n\r\n{{ creative_brief }}\r\n\r\n\r\n\r\n---\r\n\r\ngeneration_mode={{\
            \ generation_mode }}\r\n\r\nworld_name={{ world_name }}\r\n\r\nera={{\
