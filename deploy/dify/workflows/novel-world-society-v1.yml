          jinja2_text: "{% if not territory_json or (territory_json | trim) == ''\
            \ %}\r\n【严重】territory_json 为空：不得输出空 locations。请在工作流「开始」节点填写 territory_json、nations_outline_json、creative_brief，并确认\
