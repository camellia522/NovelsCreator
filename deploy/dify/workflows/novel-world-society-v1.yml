            \ local_location_count }}\r\n\r\n（city_count 与 local_location_count 相同，均为客户端行省区划算法结果，勿自行增减城市条数）\r\
            \n\r\n\r\n\r\n【国家轮廓 nations_outline_json】\r\n\r\n{{ nations_outline_json\
            \ }}\r\n\r\n\r\n\r\n【领土、行省区划与环境 territory_json — schemaVersion=3】\r\n\r\
            \n{{ territory_json }}\r\n\r\n\r\n\r\n【再次强调】\r\n\r\n- 输出 locations 数组长度必须\
